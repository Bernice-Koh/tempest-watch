services:
  postgres:
    image: postgres:16
    container_name: tempest-postgres
    environment:
      POSTGRES_USER: tempest
      POSTGRES_PASSWORD: tempest
      POSTGRES_DB: tempest_watch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tempest -d tempest_watch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
